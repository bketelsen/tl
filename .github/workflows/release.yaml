name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - binary_linux_amd64
          - binary_linux_arm64
          - binary_darwin_amd64
          - binary_darwin_arm64
          - binary_windows_amd64
          - binary_windows_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Build & test
        run: |
          make build
          make test

      - name: Package ${{ matrix.target }}
        run: make ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: tl-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check for existing release
        id: existing-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.existing-release.outputs.exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            tl ${{ github.ref_name }} - multi-platform binaries.
          files: |
            dist/**/*

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    # Set repository variable UPDATE_HOMEBREW_TAP=true and secret
    # HOMEBREW_TAP_TOKEN to enable automatic tap updates.
    if: ${{ vars.UPDATE_HOMEBREW_TAP == 'true' }}
    steps:
      - name: Checkout tl
        uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: aholbreich/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update tl formula
        env:
          VERSION: ${{ github.ref_name }}
          DIST_DIR: dist
          TAP_DIR: homebrew-tap
        run: bash .github/scripts/update-homebrew-tap.sh

      - name: Commit homebrew tap update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tl.rb
          if git diff --cached --quiet; then
            echo "Formula/tl.rb is already current"
          else
            git commit -m "tl ${{ github.ref_name }}"
            git push
          fi

  update-rpm-repo:
    needs: release
    runs-on: ubuntu-latest
    # Set repository variable UPDATE_RPM_REPO=true and secret
    # RPM_REPO_TOKEN to enable automatic RPM repository updates.
    if: ${{ vars.UPDATE_RPM_REPO == 'true' }}
    steps:
      - name: Checkout tl
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Install RPM packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm ruby ruby-dev
          sudo gem install --no-document fpm

      - name: Build tl RPM
        env:
          VERSION: ${{ github.ref_name }}
          ITERATION: "1"
        run: bash .github/scripts/build-rpm.sh

      - name: Checkout RPM repo
        uses: actions/checkout@v6
        with:
          repository: aholbreich/rpm-repo
          token: ${{ secrets.RPM_REPO_TOKEN }}
          path: rpm-repo

      - name: Publish RPM
        run: |
          cp dist/rpm/*.rpm rpm-repo/
          cd rpm-repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.rpm
          if git diff --cached --quiet; then
            echo "RPM repository is already current"
          else
            git commit -m "tl ${{ github.ref_name }}"
            git push
          fi
