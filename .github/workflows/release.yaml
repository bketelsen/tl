name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - binary_linux_amd64
          - binary_linux_arm64
          - binary_darwin_amd64
          - binary_darwin_arm64
          - binary_windows_amd64
          - binary_windows_arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Build & test
        run: |
          make build
          make test

      - name: Package ${{ matrix.target }}
        run: make ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: tl-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            tl-tool ${{ github.ref_name }} - multi-platform binaries.
          files: |
            dist/**/*

  update-homebrew-tap:
    needs: release
    runs-on: ubuntu-latest
    # Set repository variable UPDATE_HOMEBREW_TAP=true and secret
    # HOMEBREW_TAP_TOKEN to enable automatic tap updates.
    if: ${{ vars.UPDATE_HOMEBREW_TAP == 'true' }}
    steps:
      - name: Checkout tl
        uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checkout homebrew tap
        uses: actions/checkout@v4
        with:
          repository: aholbreich/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update tl formula
        env:
          VERSION: ${{ github.ref_name }}
          DIST_DIR: dist
          TAP_DIR: homebrew-tap
        run: bash .github/scripts/update-homebrew-tap.sh

      - name: Commit homebrew tap update
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/tl.rb
          if git diff --cached --quiet; then
            echo "Formula/tl.rb is already current"
          else
            git commit -m "tl ${{ github.ref_name }}"
            git push
          fi
